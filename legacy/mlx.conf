# ~/.config/mlx.conf
#
# Configuration for the `mlx` CLI (~/scripts/mlx).
# This file is sourced as a bash script; comments and shell expansion are OK.
#
# Override precedence (highest wins):
#   1) Command-line flags        (e.g. --chat-port 8001)
#   2) Environment variables     (e.g. CHAT_PORT=8001 mlx start)
#   3) This config file
#   4) Built-in defaults in the script
#
# Run `mlx config` to see the resolved values.
#
# CONVENTIONS
#   - Empty value (e.g. CHAT_LOG_LEVEL=) means "fall back to mlx_lm.server
#     default" — the flag is NOT passed to the server.
#   - Boolean toggles use 1=on, 0=off (or empty=off).
#   - All paths support tilde expansion via $HOME.
#
# Run `~/venvs/mlx/bin/mlx_lm.server --help` to see the underlying flags.

# ============================================================================
# Paths
# ============================================================================
MLX_VENV="$HOME/venvs/mlx"
MODELS_ROOT="$HOME/mlx-models"             # all model dirs live here directly now
MLX_LOG_DIR="$HOME/.logs/mlx"

# ============================================================================
# Network / shared
# ============================================================================
MLX_HOST=127.0.0.1

# CORS allowed origins. Default in mlx_lm is "*" (any origin).
# Set to your SillyTavern origin to lock it down, e.g. "http://localhost:8000".
# Leave empty to use mlx_lm's default.
ALLOWED_ORIGINS=

# ============================================================================
# CHAT SERVER  (port 1234)
# ============================================================================
# Mac unified memory can't hold two large chat models at once, so the chat
# server runs ONE profile at a time. Pick one with `--chat-model NAME` at
# start time, or change CHAT_PROFILE_DEFAULT below.
#
# Registered profiles (alias -> path). Add more lines as you download more.
typeset -gA CHAT_MODEL_PROFILES=(
    [anubis]="$MODELS_ROOT/anubis"           # Anubis-70B-v1.2 mxfp4 — Llama-3.1 family
    [eva]="$MODELS_ROOT/eva"                 # EVA-Qwen2.5-32B-v0.2 4bit — Qwen2.5 family
    [eva-6bit]="$MODELS_ROOT/eva-6bit"       # EVA-Qwen2.5-32B-v0.2 6bit (better quality, ~25GB)
    [eva-8bit]="$MODELS_ROOT/eva-8bit"
    [euryale]="$MODELS_ROOT/euryale"         # llama3.3 70B-Euryale-v2.3-mlx-4Bit
    [josie]="$MODELS_ROOT/qwen3-abl"     # Qwen3-30B-A3B-abliterated mlx 8bit (MoE: 30B total / 3B active)
    [scout]="$MODELS_ROOT/scout"         # Llama-4-Scout-17B-16E-Instruct mlx 4bit (MoE: 109B total / 17B active, 16 experts). Llama-4 family; new tokenizer (~200k vocab) so Llama-3 drafts don't apply.
    [shakudo]="$MODELS_ROOT/shakudo"     # Steelskull L3.3-Shakudo-70b mlx 4bit (multi-stage merge: Anubis+Vulpecula+EVA+Wayfarer+Euryale)
    [skyfall]="$MODELS_ROOT/skyfall"     # Drummer Skyfall-31B-v4.2 mlx 6bit — Mistral Small 3.2 base, RP-tuned. Needs temp 1.0, min_p 0.05, rep penalty 1.1 or it loops (see skyfall_sampling.md memory)
    [valkyrie]="$MODELS_ROOT/valkyrie"   # Drummer Valkyrie-49B-v2.1 mlx 6bit — Nemotron-Super-49B-v1.5 base (NAS arch, skip-attention blocks). RP defaults: temp 0.95, min_p 0.05, rep_pen 1.12. Llama-3 chat template, 131k ctx. Locally converted via mlx_lm.convert --trust-remote-code.
)
typeset -gA CHAT_DRAFT_PROFILES=(
    [anubis]="$MODELS_ROOT/anubis-draft"   # Llama-3.2-3B-Instruct draft for spec-dec
    [eva]=""                                # no Qwen2.5 draft on disk; spec-dec off
    [eva-6bit]=""                           # same: no draft for Qwen2.5
    [eva-8bit]=""                            # in CHAT_DRAFT_PROFILES
    [euryale]="$MODELS_ROOT/anubis-draft"   # try Llama-3.2-3B as draft (same family)
    [josie]=""                           # no Qwen3-A3B-class draft on disk; spec-dec off
    [scout]=""                           # no Llama-4 draft on disk (Llama-3 drafts have a different tokenizer/vocab); spec-dec off
    [shakudo]="$MODELS_ROOT/anubis-draft"   # Llama-3.3 70B base, same Llama-3 tokenizer family as draft
    [skyfall]=""                         # no Mistral-Small-3.2-class draft on disk; spec-dec off
    [valkyrie]=""                        # Nemotron-49B base (different tokenizer/vocab from Llama-3); spec-dec off
)
# Per-profile engine override. Missing/empty entry = use the global CHAT_ENGINE
# (default 'lm'). Use 'vlm' for multimodal models that should accept image
# inputs via mlx_vlm.server. Note: mlx_vlm.server ignores --prompt-cache-size,
# --prompt-cache-bytes, --log-level, --chat-template, and CHAT_DECODE/PROMPT_CONCURRENCY.
typeset -gA CHAT_ENGINE_PROFILES=(
    [scout]=vlm                          # Llama-4 Scout is multimodal — needs mlx_vlm.server to accept image_url content blocks
)
CHAT_PROFILE_DEFAULT=valkyrie

# --- Required (overridden per-profile by CHAT_*_PROFILES above when active) ---
CHAT_MODEL="$MODELS_ROOT/eva"
CHAT_PORT=1234

# --- Speculative decoding (only used when active profile has a draft) ---
CHAT_DRAFT_MODEL="$MODELS_ROOT/anubis-draft"
CHAT_NUM_DRAFT_TOKENS=8      # bumped from 7 (2026-05-05); back off to 6-7 if acceptance rate drops

# --- KV cache (in unified RAM, NOT disk) ---
# Each 4k-token sequence ≈ 1.3 GB of KV. Default 5 sequences is too small for
# active SillyTavern use (swipes/regens evict the cache → cold prompt eval).
CHAT_PROMPT_CACHE_SIZE=8              # dropped from 16 (2026-05-05) — Metal GPU timeout at 11 sequences / 39 GB
CHAT_PROMPT_CACHE_BYTES=15000000000   # ceiling not enforced reliably by mlx_lm — relies on SIZE cap above

# --- LoRA adapter (optional) ---
# Path to a fine-tuned adapter to apply on top of CHAT_MODEL. Leave blank for none.
CHAT_ADAPTER_PATH=

# --- Logging ---
# DEBUG, INFO, WARNING, ERROR, CRITICAL. Empty = mlx_lm default (INFO).
CHAT_LOG_LEVEL=

# --- Chat template overrides ---
# Override the model's tokenizer chat_template. Path or literal Jinja string.
CHAT_CHAT_TEMPLATE=
# Use mlx_lm's bundled default template instead of the model's. 1=on, 0=off.
CHAT_USE_DEFAULT_CHAT_TEMPLATE=0
# JSON dict of args for tokenizer.apply_chat_template, e.g. for thinking-style
# models: '{"enable_thinking":false}'. Leave empty for default behavior.
CHAT_CHAT_TEMPLATE_ARGS=

# --- Trust remote code ---
# Required for some HF tokenizers that need custom Python (rare). 1=on.
# Valkyrie (Nemotron-NAS) ships configuration_decilm.py and modeling_decilm.py;
# without this, AutoConfig refuses the custom config and the generic fallback
# crashes on rope_scaling (max_position_embeddings AttributeError).
CHAT_TRUST_REMOTE_CODE=1

# --- Default sampling params (per-request from SillyTavern overrides these) ---
# Set ONLY if you want server-side defaults to differ from mlx_lm's.
CHAT_DEFAULT_TEMP=                # mlx_lm default 0.0
CHAT_DEFAULT_TOP_P=                # mlx_lm default 1.0
CHAT_DEFAULT_TOP_K=                # mlx_lm default 0 (disabled)
CHAT_DEFAULT_MIN_P=                # mlx_lm default 0.0 (disabled)
CHAT_DEFAULT_MAX_TOKENS=           # mlx_lm default 512

# --- Performance tuning (advanced; leave empty unless you know why) ---
# Prompt processing chunk size (tokens-per-step during prefill). Smaller = lower
# memory spikes, slightly slower. Empty = mlx_lm auto.
CHAT_PREFILL_STEP_SIZE=8192
# Concurrent decode for batched requests. Empty = mlx_lm default.
CHAT_DECODE_CONCURRENCY=
# Concurrent prompt processing for batched requests. Empty = mlx_lm default.
CHAT_PROMPT_CONCURRENCY=

# --- Cache/memory guards (applied by the launcher shim) ---
# These are the knobs that prevent the runaway-cache crash. mlx_lm.server
# itself doesn't expose them; the shim (~/scripts/mlx-server-launch.py) sets
# them before handing off.
#
# CACHE_LIMIT_BYTES caps Metal's reusable allocator pool. Beyond this, freed
# buffers go back to the OS instead of being held. Smaller = less hoarding,
# small perf cost from re-mallocs.
CHAT_CACHE_LIMIT_BYTES=2147483648            # 2 GB
# MEMORY_LIMIT_BYTES is a hard ceiling on total MLX allocations. Hitting it
# raises in the offending request; server stays up. Empty = no cap.
# Set only if you've measured a steady-state ceiling and want a hard wall.
CHAT_MEMORY_LIMIT_BYTES=
# Janitor: every N seconds, if cache > threshold, call mx.clear_cache().
# Actual fix for unbounded growth. 0 = off.
CHAT_CACHE_CLEAR_INTERVAL_SEC=60
CHAT_CACHE_CLEAR_THRESHOLD_BYTES=1073741824  # 1 GB
# Memlog: every N seconds, log active/cache/peak to the server log. 0 = off.
CHAT_MEMORY_LOG_INTERVAL_SEC=300

# ============================================================================
# TAGS SERVER  (port 1235) — Qwen3.5-35B-A3B-Uncensored (multimodal MoE)
# ============================================================================
# Architectural max context: 262,144 tokens (256k) on the text branch.
# This model is multimodal (Qwen3_5MoeForConditionalGeneration) — accepts
# image inputs in addition to text.

# --- Engine ---
# 'vlm' = mlx_vlm.server (multimodal: accepts image_url content blocks).
# 'lm'  = mlx_lm.server  (text-only; rejects image inputs).
# Switched to vlm on 2026-05-04 so SD prompt-gen with attached avatar works.
TAGS_ENGINE=vlm

# --- Required ---
TAGS_MODEL="$MODELS_ROOT/qwen-tags"
TAGS_PORT=1235

# --- Speculative decoding ---
# Not supported by mlx_vlm.server. Leave empty under VLM. (Also no win for
# 35B-A3B MoE: only ~3B active params per token, already fast.)
TAGS_DRAFT_MODEL=
TAGS_NUM_DRAFT_TOKENS=

# --- KV cache ---
# IGNORED under VLM: mlx_vlm.server has no --prompt-cache-size / --prompt-cache-bytes.
# Use TAGS_MAX_KV_SIZE / TAGS_KV_BITS below instead. Kept for if you flip back to lm.
TAGS_PROMPT_CACHE_SIZE=16
TAGS_PROMPT_CACHE_BYTES=5000000000   # 5 GB ceiling (lm-only)

# VLM-supported KV cache controls. Empty = mlx_vlm default.
TAGS_MAX_KV_SIZE=                    # max prompt-cache tokens
TAGS_KV_BITS=                        # quantize KV cache (e.g. 4 or 8)
TAGS_KV_QUANT_SCHEME=                # uniform | turboquant
TAGS_KV_GROUP_SIZE=
TAGS_QUANTIZED_KV_START=

# --- LoRA adapter (lm + vlm) ---
TAGS_ADAPTER_PATH=

# --- Logging ---
# IGNORED under VLM (no --log-level flag).
TAGS_LOG_LEVEL=

# --- Chat template overrides ---
# IGNORED under VLM. Pass per-request via the OpenAI body's chat_template_kwargs
# (e.g. {"enable_thinking": false}) instead.
TAGS_CHAT_TEMPLATE=
TAGS_USE_DEFAULT_CHAT_TEMPLATE=0
TAGS_CHAT_TEMPLATE_ARGS='{"enable_thinking":false}'

# --- Trust remote code (lm + vlm) ---
TAGS_TRUST_REMOTE_CODE=0

# --- Default sampling params ---
# IGNORED under VLM (no CLI flags for these). Send per-request from the client.
TAGS_DEFAULT_TEMP=
TAGS_DEFAULT_TOP_P=
TAGS_DEFAULT_TOP_K=
TAGS_DEFAULT_MIN_P=
TAGS_DEFAULT_MAX_TOKENS=

# --- Performance tuning ---
TAGS_PREFILL_STEP_SIZE=              # works on both engines
TAGS_DECODE_CONCURRENCY=             # lm-only
TAGS_PROMPT_CONCURRENCY=             # lm-only

# --- Cache/memory guards (applied by the launcher shim) ---
# See CHAT_CACHE_* notes above for what these do.
TAGS_CACHE_LIMIT_BYTES=1073741824           # 1 GB
TAGS_MEMORY_LIMIT_BYTES=
TAGS_CACHE_CLEAR_INTERVAL_SEC=60
TAGS_CACHE_CLEAR_THRESHOLD_BYTES=536870912  # 512 MB
TAGS_MEMORY_LOG_INTERVAL_SEC=300

# ============================================================================
# TTS SERVER  (port 1237) — OmniVoice text-to-speech via mlx-audio
# ============================================================================
# mlx_audio.server is multi-model and has no --model flag; it loads on demand
# via POST /v1/models or by referencing the model in /v1/audio/speech. The
# launcher preloads TTS_MODEL plus any TTS_EXTRA_MODELS after startup so the
# first request doesn't pay the load tax.
#
# Deps in $MLX_VENV: mlx-audio, webrtcvad, python-multipart.
# OAI endpoint: POST /v1/audio/speech  with  {"model": "<path>", "input": "..."}
# Through the router: use the alias "omnivoice" (or whatever basename of TTS_MODEL).

TTS_MODEL="$MODELS_ROOT/omnivoice"   # primary TTS model
TTS_EXTRA_MODELS=                    # comma-separated extra models to keep resident
TTS_PORT=1237
TTS_BIN="$MLX_VENV/bin/mlx_audio.server"

# ============================================================================
# KOKORO SERVER  (port 8880) — Kokoro TTS via mlx-audio, dedicated process
# ============================================================================
# Separate mlx_audio.server pinned to the kokoro-fastapi default port (8880).
# Use this when a client hardcodes 8880 (Open WebUI TTS, etc.) and needs
# Kokoro specifically. Same binary as the TTS server; runs as its own process.

KOKORO_MODEL="$MODELS_ROOT/kokoro"   # mlx-community/Kokoro-82M-bf16
KOKORO_PORT=8880
KOKORO_BIN="$MLX_VENV/bin/mlx_audio.server"

# ============================================================================
# ROUTER  (port 8080) — OpenAI proxy that fronts chat + tags + embed + tts
# ============================================================================
# Optional. Fronts the chat server (swap-on-demand by `model` field), the tags
# server, the embed server, and the TTS server. Aggregates /v1/models across
# all four so clients see the full catalog. Lets ST's UI dropdown drive backend
# selection from anywhere (phone, etc.) without typing terminal commands.
#
# Start:   mlx router start
# Status:  mlx router status
# Use:     point SillyTavern at http://127.0.0.1:8080/v1 and set the model
#          name to a chat profile (anubis, skyfall, ...) or a static alias
#          (qwen-tags, embed, omnivoice, kokoro).

ROUTER_HOST=127.0.0.1       # local-only — ST runs on this same box and hits the router via loopback.
                             # Phone reaches ST's UI over tailnet; ST→router stays internal.
ROUTER_PORT=8080            # mlx_lm.server's default port; clients that default to it find the router
ROUTER_EXTRA_PORTS=         # comma-separated additional ports to bind (e.g. "1230,1234")
ROUTER_SCRIPT="$HOME/scripts/mlx-router.py"
ROUTER_SWITCH_TIMEOUT=90    # seconds to wait for backend after a swap
ROUTER_LOG_LEVEL=INFO       # DEBUG | INFO | WARNING | ERROR
ROUTER_STATICS=             # name=url[|upstream] pairs; empty = auto-derive from TAGS_PORT/EMBED_PORT/TTS_PORT
ROUTER_TAGS_ALIAS=          # alias for tags backend; empty = basename(TAGS_MODEL)
ROUTER_EMBED_ALIAS=embed    # alias for embed backend
ROUTER_TTS_ALIAS=           # alias for tts backend; empty = basename(TTS_MODEL)
